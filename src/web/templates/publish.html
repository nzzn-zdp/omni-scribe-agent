<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布管理 - OmniScribeAgent</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">OmniScribeAgent</a>
            <ul class="nav-links">
                <li><a href="/hotspots">热点监控</a></li>
                <li><a href="/content">内容生产</a></li>
                <li><a href="/publish">发布管理</a></li>
                <li><a href="/settings">系统设置</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container">
        <div class="publish-page">
            <h1>发布管理</h1>
            
            <div class="publish-actions">
                <button id="add-platform-btn" class="btn btn-primary">添加平台</button>
                <button id="refresh-publish-btn" class="btn btn-secondary">刷新列表</button>
            </div>
            
            <div class="publish-tabs">
                <button class="tab-btn active" data-tab="platforms">平台配置</button>
                <button class="tab-btn" data-tab="records">发布记录</button>
            </div>
            
            <div class="publish-lists">
                <div id="platforms-list" class="publish-list active">
                    <!-- 平台配置将通过JavaScript动态加载 -->
                </div>
                <div id="records-list" class="publish-list">
                    <!-- 发布记录将通过JavaScript动态加载 -->
                </div>
            </div>
            
            <!-- 添加平台模态框 -->
            <div id="add-platform-modal" class="modal">
                <div class="modal-content">
                    <span class="modal-close">&times;</span>
                    <h2>添加平台</h2>
                    <form id="add-platform-form">
                        <div class="form-group">
                            <label for="platform-name">平台名称</label>
                            <input type="text" id="platform-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="platform-type">平台类型</label>
                            <select id="platform-type" name="platform_type">
                                <option value="wechat">微信公众号</option>
                                <option value="weibo">微博</option>
                                <option value="zhihu">知乎</option>
                                <option value="xiaohongshu">小红书</option>
                                <option value="wordpress">WordPress</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="platform-config">配置 (JSON)</label>
                            <textarea id="platform-config" name="config" rows="4">{}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">添加</button>
                    </form>
                </div>
            </div>
            
            <!-- 编辑平台模态框 -->
            <div id="edit-platform-modal" class="modal">
                <div class="modal-content">
                    <span class="modal-close">&times;</span>
                    <h2>编辑平台</h2>
                    <form id="edit-platform-form">
                        <input type="hidden" id="edit-platform-id" name="id">
                        <div class="form-group">
                            <label for="edit-platform-name">平台名称</label>
                            <input type="text" id="edit-platform-name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="edit-platform-type">平台类型</label>
                            <select id="edit-platform-type" name="platform_type">
                                <option value="wechat">微信公众号</option>
                                <option value="weibo">微博</option>
                                <option value="zhihu">知乎</option>
                                <option value="xiaohongshu">小红书</option>
                                <option value="wordpress">WordPress</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="edit-platform-config">配置 (JSON)</label>
                            <textarea id="edit-platform-config" name="config" rows="4"></textarea>
                        </div>
                        <div class="form-group">
                            <label for="edit-platform-active">状态</label>
                            <select id="edit-platform-active" name="is_active">
                                <option value="true">活跃</option>
                                <option value="false">停用</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
            </div>
            
            <!-- 发布内容模态框 -->
            <div id="publish-content-modal" class="modal">
                <div class="modal-content">
                    <span class="modal-close">&times;</span>
                    <h2>发布内容</h2>
                    <form id="publish-content-form">
                        <div class="form-group">
                            <label for="draft-id">草稿ID</label>
                            <input type="number" id="draft-id" name="draft_id" required>
                        </div>
                        <div class="form-group">
                            <label>选择平台</label>
                            <div id="platforms-checkboxes" class="checkboxes-grid">
                                <!-- 平台复选框将通过JavaScript动态加载 -->
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">发布</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    
    <script src="/static/js/publish.js"></script>
</body>
</html>
