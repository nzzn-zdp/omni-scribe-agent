<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScribeAgent - 自动化内容生产与分发</title>
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">OmniScribeAgent</a>
            <ul class="nav-links">
                <li><a href="/hotspots">热点监控</a></li>
                <li><a href="/content">内容生产</a></li>
                <li><a href="/publish">发布管理</a></li>
                <li><a href="/settings">系统设置</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container">
        <div class="dashboard">
            <h1>系统概览</h1>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>热点源</h3>
                    <p id="hotspot-sources-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>内容任务</h3>
                    <p id="content-tasks-count">0</p>
                </div>
                <div class="stat-card">
                    <h3>已发布</h3>
                    <p id="published-count">0</p>
                </div>
            </div>
            
            <div class="quick-actions">
                <h2>快速操作</h2>
                <div class="actions-grid">
                    <a href="/hotspots" class="action-card">
                        <div class="action-icon">🔥</div>
                        <h3>热点监控</h3>
                        <p>查看和管理热点话题</p>
                    </a>
                    <a href="/content" class="action-card">
                        <div class="action-icon">✍️</div>
                        <h3>内容生产</h3>
                        <p>生成和管理内容</p>
                    </a>
                    <a href="/publish" class="action-card">
                        <div class="action-icon">🚀</div>
                        <h3>发布管理</h3>
                        <p>发布到各平台</p>
                    </a>
                    <a href="/settings" class="action-card">
                        <div class="action-icon">⚙️</div>
                        <h3>系统设置</h3>
                        <p>配置系统参数</p>
                    </a>
                </div>
            </div>
            
            <div class="system-status-section">
                <h2>系统状态</h2>
                <div class="status-grid">
                    <div class="status-item">
                        <span class="status-indicator system-status" data-service="event_bus"></span>
                        <span>事件总线</span>
                    </div>
                    <div class="status-item">
                        <span class="status-indicator system-status" data-service="task_queue"></span>
                        <span>任务队列</span>
                    </div>
                    <div class="status-item">
                        <span class="status-indicator system-status" data-service="database"></span>
                        <span>数据库</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
    
    <script src="/static/js/main.js"></script>
</body>
</html>
