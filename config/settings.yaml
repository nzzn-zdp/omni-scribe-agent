app:
  name: OmniScribeAgent
  version: 1.0.0
  debug: false

database:
  url: sqlite+aiosqlite:///./data/db/omniscribe.db

redis:
  url: redis://localhost:6379/0

llm:
  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      model: gpt-4
      max_tokens: 4096
    claude:
      api_key: ${CLAUDE_API_KEY}
      model: claude-3-opus-20240229
      max_tokens: 4096

hotspot:
  check_interval: 300
  min_score: 0.6

publish:
  retry_count: 3
  retry_delay: 60
